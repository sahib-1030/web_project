<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripCraft | Premium Smart Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #3a7bd5;
            --glass: rgba(255, 255, 255, 0.12);
            --glass-heavy: rgba(255, 255, 255, 0.98);
            --text-light: #ffffff;
            --text-dark: #0f172a;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* --- ATTRACTIVE LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=1920&q=80') no-repeat center center;
            background-size: cover;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Dark overlay for the login background */
        #login-overlay::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
        }

        .login-card {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 90%;
            max-width: 450px;
            padding: 60px 40px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card .logo-text { 
            font-size: 2.8rem; 
            font-weight: 800; 
            margin-bottom: 10px; 
            letter-spacing: -1px;
            color: #fff;
        }
        
        .login-card .logo-text span { color: var(--primary); }
        
        .login-card p { 
            color: rgba(255,255,255,0.8); 
            margin-bottom: 35px; 
            font-size: 1rem;
        }

        .login-card input {
            width: 100%; 
            padding: 16px 20px; 
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3); 
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px; 
            outline: none; 
            font-size: 1rem;
            color: #fff;
        }

        .login-card input::placeholder { color: rgba(255,255,255,0.6); }

        .login-card input:focus { 
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .btn-login {
            width: 100%; 
            padding: 18px; 
            border-radius: 15px; 
            border: none;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white; 
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover { 
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.4);
        }

        /* --- MAIN APP INTERFACE --- */
        #main-app { display: none; flex-direction: column; min-height: 100vh; }

        nav {
            padding: 1rem 8%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-size: 1.8rem; font-weight: 800; color: #fff; text-transform: uppercase; }
        .logo span { color: var(--primary); }

        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 40px;
        }

        label { display: block; margin-bottom: 8px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
        .app-input { padding: 14px; border-radius: 12px; border: none; font-size: 1rem; width: 100%; margin-bottom: 20px; outline: none;}

        .btn-action {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer;
        }

        .result-card {
            background: var(--glass-heavy); border-radius: 24px; padding: 30px;
            color: var(--text-dark); max-height: 75vh; overflow-y: auto;
        }

        .budget-badge {
            background: #f0fdf4; color: #166534; padding: 10px; border-radius: 12px;
            display: block; font-weight: 700; margin-bottom: 20px; text-align: center; border: 1px solid #bbf7d0;
        }

        .day-block { border-bottom: 1px solid #eee; padding: 15px 0; }
        .day-title { color: var(--accent); font-weight: 800; font-size: 1.1rem; }
        
        .cost-analysis { background: #f1f5f9; border-radius: 12px; padding: 15px; margin-top: 20px; border: 1px dashed #94a3b8; }

        .hidden { display: none !important; }
        .back-link { color: var(--accent); cursor: pointer; display: block; margin-top: 20px; text-align: center; font-weight: 700; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <div class="logo-text">TRIP<span>CRAFT</span></div>
            
            
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            
            <button class="btn-login" onclick="checkAuth()">Sign In</button>
            <div id="login-err" style="color:#ff4d4d; font-size:0.85rem; margin-top:15px; display:none; font-weight: 600;">Invalid Credentials! Access Denied.</div>
            
            <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                
            </div>
        </div>
    </div>

    <div id="main-app">
        <nav>
            <div class="logo">TRIP<span>CRAFT</span></div>
            <div style="font-size: 0.8rem; opacity: 0.8;">Welcome, Yuvraj</div>
        </nav>

        <main>
            <div class="container">
                <div id="input-section">
                    <h1 style="text-align:center; margin-bottom:30px;">Plan Your Trip</h1>
                    <label>Destination</label>
                    <input type="text" id="dest" class="app-input" placeholder="Goa, Paris, Manali, London...">
                    
                    <div style="display:flex; gap:15px;">
                        <div style="flex:1">
                            <label>Days</label>
                            <input type="number" id="days" value="3" min="1" max="7" class="app-input">
                        </div>
                        <div style="flex:2">
                            <label>Budget (₹)</label>
                            <input type="number" id="budget" placeholder="e.g. 25000" class="app-input">
                        </div>
                    </div>

                    <label>Preference</label>
                    <select id="vibe" class="app-input">
                        <option value="Backpacker">Budget Friendly</option>
                        <option value="Mid-Range">Mid-Range Comfort</option>
                        <option value="Luxury">Premium Luxury</option>
                    </select>

                    <button class="btn-action" onclick="generateTrip()">Generate Optimized Plan</button>
                </div>

                <div id="result-section" class="hidden">
                    <div class="result-card">
                        <h2 id="display-title" style="margin:0 0 5px 0"></h2>
                        <div id="budget-info" class="budget-badge"></div>
                        <div id="itinerary-list"></div>
                        <div class="cost-analysis">
                            <h4 style="margin:0 0 10px 0; color:#334155;">📊 Budget Breakdown</h4>
                            <div id="breakdown-text" style="font-size:0.85rem; line-height:1.6; color:#475569;"></div>
                        </div>
                        <a class="back-link" onclick="resetPage()">← Plan a New Trip</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. AUTH LOGIC
        function checkAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "Yuvraj" && p === "Project") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
            } else {
                document.getElementById('login-err').style.display = 'block';
            }
        }

        // 2. DESTINATION DATA
        const locations = {
            "goa": {
                img: "https://images.unsplash.com/photo-1512343879784-a960bf40e7f2?auto=format&fit=crop&w=1600",
                spots: ["Calangute Beach", "Fort Aguada", "Dudhsagar Falls", "Panjim Market", "Baga Beach Cabanas", "Old Goa Churches"]
            },
            "manali": {
                img: "https://images.unsplash.com/photo-1626621341517-bbf3d9990a23?auto=format&fit=crop&w=1600",
                spots: ["Solang Valley", "Rohtang Pass", "Hadimba Devi Temple", "Old Manali Cafes", "Mall Road", "Beas River Point"]
            },
            "paris": {
                img: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=1600",
                spots: ["Eiffel Tower", "Louvre Museum", "Seine River", "Montmartre", "Arc de Triomphe", "Champs-Élysées"]
            },
            "default": {
                img: "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=1600",
                spots: ["City Square", "Main Museum", "Central Park", "Local Food Street", "Historic Landmark", "Viewpoint Hill"]
            }
        };

        // 3. GENERATOR LOGIC (Internal logic preserved)
        function generateTrip() {
            const destName = document.getElementById('dest').value;
            const days = parseInt(document.getElementById('days').value);
            const budget = parseInt(document.getElementById('budget').value) || 0;
            const vibe = document.getElementById('vibe').value;

            if(!destName) { alert("Please enter a destination!"); return; }

            const key = destName.toLowerCase();
            const cityData = locations[key] || locations["default"];

            // UI Switch
            document.body.style.background = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${cityData.img}')`;
            document.body.style.backgroundSize = "cover";
            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            document.getElementById('display-title').innerText = `${destName} Itinerary`;
            
            // Budget Calculation
            let daily = Math.floor(budget / days);
            document.getElementById('budget-info').innerText = `${vibe} Mode • Daily: ₹${daily.toLocaleString('en-IN')}`;

            // Build List
            const list = document.getElementById('itinerary-list');
            list.innerHTML = "";
            for(let i = 1; i <= days; i++) {
                const s1 = cityData.spots[Math.floor(Math.random() * cityData.spots.length)];
                const s2 = cityData.spots[Math.floor(Math.random() * cityData.spots.length)];
                const div = document.createElement('div');
                div.className = 'day-block';
                div.innerHTML = `
                    <div class="day-title">DAY ${i}</div>
                    <div>🚩 Morning: ${s1}</div>
                    <div>📍 Afternoon: ${s2}</div>
                `;
                list.appendChild(div);
            }

            // Allocation Breakdown
            document.getElementById('breakdown-text').innerHTML = `
                • 🏨 Stay: ₹${Math.floor(budget * 0.45).toLocaleString('en-IN')}<br>
                • 🍱 Meals: ₹${Math.floor(budget * 0.25).toLocaleString('en-IN')}<br>
                • 🚕 Transit: ₹${Math.floor(budget * 0.15).toLocaleString('en-IN')}<br>
                • 🎟️ Misc/Fees: ₹${Math.floor(budget * 0.15).toLocaleString('en-IN')}
            `;
        }

        function resetPage() {
            document.getElementById('input-section').classList.remove('hidden');
            document.getElementById('result-section').classList.add('hidden');
            document.body.style.background = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${locations.default.img}')`;
        }
    </script>
</body>
</html>
