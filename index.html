    <script type="text/babel">         const { useState } = React;         function BudgetPlanner({ totalBudget }) {             const [stay, setStay] = useState(45);             const [food, setFood] = useState(25);             const [transit, setTransit] = useState(15);             const [misc, setMisc] = useState(15); 
 
            const format = (val) => Math.floor(totalBudget * (val / 100)).toLocaleString('en-IN'); 
            const currentTotalAllocated = Math.floor(totalBudget * ((parseInt(stay) + parseInt(food) + parseInt(transit) + parseInt(misc)) / 100)); 
 
            return ( 
                <div className="react-budget-card"> 
                    <h4 style={{margin: "0 0 15px 0", color: "#334155"}}>  React Dynamic Budgeter</h4> 
                    <div> 
                        <label style={{fontSize: "0.7rem"}}>  Stay ({stay}%): ₹{format(stay)}</label> 
                        <input type="range" className="budget-slider" value={stay} min="0" max="100" onChange={(e) => setStay(e.target.value)} /> 
                    </div> 
                    <div> 
                        <label style={{fontSize: "0.7rem"}}>  Meals ({food}%): ₹{format(food)}</label> 
                        <input type="range" className="budget-slider" value={food} min="0" max="100" onChange={(e) => setFood(e.target.value)} /> 
     	       </div> 
     	        <div> 
                 <label style={{fontSize: "0.7rem"}}>  Transit ({transit}%): ₹{format(transit)}</label> 
                     <input type="range" className="budget-slider" value={transit} min="0" max="100" onChange={(e) => setTransit(e.target.value)} /> 
                    </div> 
                    <div> 
                        <label style={{fontSize: "0.7rem"}}>  Misc ({misc}%): ₹{format(misc)}</label> 
                        <input type="range" className="budget-slider" value={misc} min="0" max="100" onChange={(e) => setMisc(e.target.value)} /> 
                    </div> 
                     
                    <div className="total-budget-badge"> 
                        Total Allocated: ₹{currentTotalAllocated.toLocaleString('en-IN')} 
                    </div> 
                </div> 
            ); 
        } 
        window.mountBudgetPlanner = (budget) => {             const root = ReactDOM.createRoot(document.getElementById('react-budget-root'));             root.render(<BudgetPlanner totalBudget={budget} />); 
        }; 
    </script>

        /* ============================================================            3. GENERATOR & CORE LOGIC 
        ============================================================ */ 
        let currentTrip = {};         let leafletMap = null; 
 
        function generateTrip() {             const destName = document.getElementById('dest').value;             const days = parseInt(document.getElementById('days').value);             const budget = parseInt(document.getElementById('budget').value) || 0;             const vibe = document.getElementById('vibe').value;             if (!destName) { alert("Please enter a destination!"); return; } 
 
            const key = destName.toLowerCase();             const cityData = locations[key] || locations["default"];             currentTrip = { destName, days, budget, vibe, cityData, key }; 
 
            document.body.style.background = `linear-
gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),url('${cityData.img}')`;             document.body.style.backgroundSize = "cover";             document.getElementById('input-section').classList.add('hidden');             document.getElementById('result-section').classList.remove('hidden');             document.getElementById('display-title').innerText = `${destName} Itinerary`; 
            document.getElementById('budget-info').innerText = `${vibe} Mode • Daily: ₹${Math.floor(budget/days).toLocaleString('en-IN')}`; 
        const list = document.getElementById('itinerary-list');             list.innerHTML = "";           for (let i = 1; i <= days; i++) {                 const s1 = cityData.spots[Math.floor(Math.random() * cityData.spots.length)];                 const s2 = cityData.spots[Math.floor(Math.random() * cityData.spots.length)];                 const div = document.createElement('div');                 div.className = 'day-block'; 
                div.innerHTML = `<div class="day-title">DAY ${i}</div><div>  Morning: 
${s1}</div><div>  Afternoon: ${s2}</div>`; 
                list.appendChild(div); 
            } 
 
            if (window.mountBudgetPlanner) window.mountBudgetPlanner(budget); 
 
            switchTab('itinerary'); 
            loadWeather(cityData.weatherCity, 3);             loadMap(cityData);             initAIChat(destName); 
        } 
 
        function resetPage() {             document.getElementById('input-section').classList.remove('hidden');             document.getElementById('result-section').classList.add('hidden'); 
            document.body.style.background = `linear-
gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),url('${locations.default.img}')`;             if (leafletMap) { leafletMap.remove(); leafletMap = null; } 
        } 
 
        function switchTab(name) { 
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', ['itinerary','weather','map','ai'][i] === name));        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));             document.getElementById('tab-' + name).classList.add('active');             if (name === 'map' && leafletMap) setTimeout(() => leafletMap.invalidateSize(), 100); 
        } 
 
        /* ============================================================            4. WEATHER (3 DAY DETAILED) 
        ============================================================ */ 
        const weatherIconsMap = { "Clear": " ", "Clouds": " ", "Rain": " ", "Drizzle": " ", "Thunderstorm": " ", "Snow": " ", "Mist": " " }; 
 
        async function loadWeather(cityLabel, daysToShow) {             const container = document.getElementById('weather-content'); 
            container.innerHTML = `<div style="text-align:center;padding:30px;"><span class="spinner"></span> Loading detailed weather...</div>`; 
            try { 
                const curRes = await 
fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(cityLabel)}&u nits=metric&appid=${WEATHER_API_KEY}`); 
                const curData = await curRes.json(); 
                 
                const fRes = await 
fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(cityLabel)}&u nits=metric&appid=${WEATHER_API_KEY}`); 
                const fData = await fRes.json(); 
 
                const dailyMap = {};                 fData.list.forEach(item => {                     const date = item.dt_txt.split(' ')[0];                     if (!dailyMap[date]) dailyMap[date] = item; 
                }); 
                const forecastDays = Object.values(dailyMap).slice(0, 3); 
 
   	       container.innerHTML = ` 
                <div class="weather-widget"> 
                        <div class="wlabel">Current Weather in ${curData.name}</div> 
                      <div class="wval">${weatherIconsMap[curData.weather[0].main] || " "} ${Math.round(curData.main.temp)}°C</div> 
                        <div class="wrow"> 
                            <div class="witem"><div 
class="wlabel">Humidity</div>${curData.main.humidity}%</div> 
                            <div class="witem"><div class="wlabel">Wind</div>${curData.wind.speed}m/s</div> 
                        </div> 
                    </div> 
                    <div class="forecast-row"> 
                        ${forecastDays.map(f => ` 
                            <div class="forecast-card"> 
                                <div class="fday">${new Date(f.dt_txt).toLocaleDateString('enIN',{weekday:'short'})}</div> 
                                <div class="ficon">${weatherIconsMap[f.weather[0].main] || " "}</div>                                 <div class="ftemp">${Math.round(f.main.temp)}°C</div> 
                            </div>`).join('')} 
                    </div>`; 
            } catch (err) { container.innerHTML = "Weather data unavailable."; } 
        } 
 
        /* ============================================================ 
           5. MAP & AI & SAVE 
        ============================================================ */ 
        function loadMap(cityData) {             const spotList = document.getElementById('spot-list'); 
            spotList.innerHTML = cityData.spots.map((s, i) => `<div class="spot-item" onclick="focusMap(${i})"><div class="spot-num">${i+1}</div><div><div class="spotname">${s}</div></div></div>`).join(''); 
        } 
 
   function focusMap(i) { switchTab('map'); if(leafletMap) 
leafletMap.setView(currentTrip.cityData.spotCoords[i], 15, {animate:true}); } 
 
        function initLeafletMap(cityData) {             if (leafletMap) leafletMap.remove();             leafletMap = L.map('trip-map').setView(cityData.coords, 12); 
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(leafletMap); 
            cityData.spots.forEach((spot, i) => { 
L.marker(cityData.spotCoords[i]).addTo(leafletMap).bindPopup(spot); }); 
        } 
 
        const origSwitchTab = switchTab;         let mapInited = false;         switchTab = function(name) {             origSwitchTab(name);             if (name === 'map' && !mapInited && currentTrip.cityData) { 
                mapInited = true;                 setTimeout(() => initLeafletMap(currentTrip.cityData), 150); 
            } 
        }; 
 
        const SUGGESTIONS = [ 
            { label: "Local Foods  ", key: "local foods" }, { label: "Packing Tips  ", key: "packing" }, { label: "Safety Tips  ", key: "safety" }, 
            { label: "Save Money  ", key: "money" }, { label: "Best Time  ", key: "time" }, { label: "Hidden Gems  ", key: "gems" } 
        ]; 
 
        function initAIChat(dest) {             document.getElementById('chat-messages').innerHTML = ''; 
            document.getElementById('quick-tips').innerHTML = SUGGESTIONS.map(s => `<span class="tip-chip" onclick="askAI('${s.key}', '${s.label}')">${s.label}</span>`).join('');    	   addMsg('ai', `Welcome to **${dest}**! How can I help?`); 
    } 
 
      function askAI(key, label) {             addMsg('user', label);             addTyping();             setTimeout(() => { removeTyping(); addMsg('ai', currentTrip.cityData.answers[key]); }, 800); 
        } 
 
        async function sendChat() {             const input = document.getElementById('chat-input');             const text = input.value.trim().toLowerCase(); 
            if (!text) return; 
            input.value = ''; addMsg('user', text); addTyping();             setTimeout(() => {                 removeTyping();                 let found = false; 
                for (let s of SUGGESTIONS) { if (text.includes(s.key.split(' ')[0])) { addMsg('ai', currentTrip.cityData.answers[s.key]); found = true; break; } } 
                if (!found) addMsg('ai', `I'm a specialist for **${currentTrip.destName}**. Try one of the suggested questions!`); 
            }, 1000); 
        } 
 
        function addMsg(role, html) {             const box = document.getElementById('chat-messages');             const div = document.createElement('div');             div.className = `msg ${role}`; 
            div.innerHTML = `<div class="msg-sender">${role==='ai' ? '  TripCraft AI' : '  You'}</div>${html}`;             box.appendChild(div); box.scrollTop = box.scrollHeight; 
        } 
 
        function addTyping() { const box = document.getElementById('chat-messages'); const div = document.createElement('div'); div.className = 'msg ai'; div.id = 'typing-indicator'; div.innerHTML = `<span class="typing-dot"></span><span class="typing-dot"></span>`; box.appendChild(div); } 
        function removeTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); } 
 
        function saveTrip() {             const { destName, days, budget, vibe } = currentTrip;             const savedTrips = JSON.parse(localStorage.getItem('tripcraft_trips') || '[]'); 
            savedTrips.unshift({ id: Date.now(), destName, days, budget, vibe, savedAt: new Date().toLocaleDateString('en-IN', { day:'numeric', month:'short' }) });             localStorage.setItem('tripcraft_trips', JSON.stringify(savedTrips));             showToast('  Trip saved to My Trips!'); 
        } 
 
        function openSavedOverlay() {             const trips = JSON.parse(localStorage.getItem('tripcraft_trips') || '[]');             const container = document.getElementById('saved-trips-list'); 
            container.innerHTML = trips.length === 0 ? "No trips." : trips.map(t => `<div class="saved-tripcard"><div class="st-header"><div><div class="st-dest">  ${t.destName}</div><div style="fontsize:0.7rem; color:#94a3b8;">${t.savedAt}</div></div><span class="st-delete" onclick="deleteTrip(${t.id})">Delete</span></div><div class="st-meta"><span class="savedbadge">${t.days} Days</span><span class="saved-badge">₹${t.budget}</span><span class=\"savedbadge\">${t.vibe}</span></div></div>`).join('');             document.getElementById('saved-overlay').classList.add('open'); 
        } 
 
        function deleteTrip(id) { const trips = JSON.parse(localStorage.getItem('tripcraft_trips') || '[]'); localStorage.setItem('tripcraft_trips', JSON.stringify(trips.filter(t => t.id !== id))); openSavedOverlay(); 
} 
        function closeSavedOverlay() { document.getElementById('savedoverlay').classList.remove('open'); } 
        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); } 
        
        const _origGenerate = generateTrip;         generateTrip = function() { mapInited = false; _origGenerate(); };     </script>
